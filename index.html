<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบ SAR - โรงเรียนบ้านหนองหัวหมู</title>
    <style>
        /* ตั้งค่าให้หน้าเว็บไม่มีขอบขาวและเต็มจอภาพพอดี */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* ซ่อนแถบเลื่อนของหน้าเว็บหลัก ป้องกัน scrollbar ซ้อนกัน */
            background-color: #f0f2f5; /* สีพื้นหลังเผื่อโหลดช้า */
        }
        
        /* ตั้งค่า iframe ให้เต็มพื้นที่ */
        iframe {
            width: 100%;
            height: 100%;
            border: none; /* เอาเส้นขอบออก */
            display: block;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/macros/s/AKfycbzaOc6VzoW8VXDSOEJwxmTXuZJWgVbZDd1C1Wu5vpWJQ8kRA4AM7hfusUMzkpunkPWl0w/exec"></iframe>

</body>
</html>
